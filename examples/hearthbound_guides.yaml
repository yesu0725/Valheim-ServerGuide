  - id: recovery_tips
    title: "Death Recovery"
    category: General
    version: 1
    summary: >
      You received multiple death recovery reminders: find your grave marker on the map
      to recover your gear, and remember that skill experience lost on death recovers with
      use. ComfyQuickSlots also spawns equipped items in a separate grave above your
      tombstone so nothing is ever truly lost.
    trigger:
      type: player_death
      max_fires: 1
    display:
      mode: raven
      topic: "Death Recovery"
    message: "Your grave marks where your gear fell — look for the tombstone icon on your map. You lose some skill exp on death, but it recovers with use."
    once: false
