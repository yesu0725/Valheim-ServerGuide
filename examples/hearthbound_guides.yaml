    display:
      mode: raven
      topic: "World Locations"
    message: "You discovered a new location. More World Locations AIO adds 178 points of interest across all biomes — ports, shrines, dungeons, puzzle sites, and special traders are scattered throughout the world."
    once: true

  - id: more_world_locations_2
    title: "More World Locations AIO"
    category: Exploration
    version: 1
    requires: [more_world_locations_1]
    summary: >
      You discovered a second MWL site and learned about the variety: coastal ports with
      trade goods, ancient shrines granting temporary blessings, and hidden dungeons with
      boss-tier enemies and unique drops. Check your map for unfamiliar markers.
    trigger:
      type: location_entered
