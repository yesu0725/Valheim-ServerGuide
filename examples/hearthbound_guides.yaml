  - id: more_world_locations_3
    title: "More World Locations AIO"
    category: Exploration
    version: 1
    requires: [more_world_locations_2]
    summary: >
      You received the final MWL tip: some locations contain special traders with rare
      stock and puzzle rooms with environment-based rewards. Review your map markers
      carefully — distinctive icons mark trader and puzzle locations worth a dedicated visit.
    trigger:
      type: timed
      interval: "60"
      id: mwl_reward_tip
    display:
      mode: raven
      topic: "World Locations"
    description: >
      This tip fires automatically 1 minute after discovering your second MWL location.
      Open your map and review any recently added markers — trader and puzzle locations
      show distinctive icons and are worth a dedicated visit.
    message: "Some locations contain special traders with rare stock and puzzle rooms with environment-based rewards. Check your map markers carefully for hidden points of interest."
    once: true

  # ZenBossStone has no buildable piece. The Boss Stone is pre-placed in the Spawn
  # Temple. Each player has their own personal achievements on it. Sacrificing boss
  # trophies at the stone unlocks boss items for that player only.
  - id: zenbossstone_chain
    title: "ZenBossStone — Boss Progression"
    category: Exploration
    version: 1
    scope: player
    summary: >
      You slew Eikthyr and learned about the personal Boss Stone in the Spawn Temple.
      Sacrifice boss trophies at your stone to unlock exclusive boss items for your
      character only. Each victory is tracked individually — your stone is yours alone.
    trigger:
      type: item_acquired
      item: TrophyEikthyr
    display:
      mode: rune
      topic: "Boss Stone"
    message: "You have slain Eikthyr and claimed his trophy. Return to the Spawn Temple and sacrifice the trophy at your personal Boss Stone — the stone tracks your boss victories and yours alone. Each sacrifice unlocks powerful boss items exclusive to that victory. The Boss Stone is waiting at the Spawn Temple."
    once: true


